<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TCC Demand Planning — Forecast</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0F1C2E;--navy2:#1A2D44;--navy3:#243F5C;
      --white:#FFFFFF;--mist:#F0F4F8;--surface:#FFFFFF;
      --border:#D8E2EE;--borders:#B0C4D8;
      --text:#0F1C2E;--text2:#3A4F63;--text3:#7A90A4;
      --amber:#B45309;--amberbg:#FEF3C7;--amberbd:#FCD34D;
      --blue:#1D4ED8;--bluebg:#EFF6FF;--bluebd:#BFDBFE;
      --green:#166534;--greenbg:#DCFCE7;
      --red:#991B1B;--redbg:#FEE2E2;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      --mono:'SF Mono','Consolas','Monaco',monospace;
      --r:5px;
    }
    html{font-size:13px}
    body{font-family:var(--font);background:var(--mist);color:var(--text);line-height:1.45;min-height:100vh}

    /* TOP BAR */
    .bar{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:14px;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .bar-logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;white-space:nowrap}
    .bar-logo span{color:#60A5FA}
    .bar-sub{font-size:11px;color:#93B4CC;border-left:1px solid var(--navy3);padding-left:12px;white-space:nowrap}
    .bar-right{margin-left:auto;display:flex;gap:8px;align-items:center}

    /* BUTTONS */
    button{cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;border-radius:var(--r);border:1px solid var(--borders);background:var(--white);color:var(--text2);padding:5px 12px;transition:background .12s;white-space:nowrap}
    button:hover:not(:disabled){background:var(--mist)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .btn-primary{background:#2563EB;color:#fff;border-color:#1D4ED8}
    .btn-primary:hover:not(:disabled){background:#1D4ED8}
    .btn-ghost{background:transparent;border-color:#3A5472;color:#93B4CC}
    .btn-ghost:hover:not(:disabled){background:var(--navy3);color:#fff}
    .btn-sm{padding:3px 8px;font-size:11px}
    .btn-danger{color:var(--red);border-color:#FCA5A5}
    .btn-danger:hover:not(:disabled){background:var(--redbg)}

    /* INPUTS */
    input,select{font-family:var(--font);font-size:12px;border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;background:var(--white);color:var(--text);transition:border-color .12s}
    input:focus,select:focus{outline:none;border-color:#2563EB;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button{opacity:.4}

    /* PAGE */
    .page{padding:16px 20px}

    /* UPLOAD CARD */
    .upload-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px);padding:24px}
    .upload-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:32px;max-width:520px;width:100%;box-shadow:0 1px 4px rgba(15,28,46,.08)}
    .upload-card h2{font-size:16px;font-weight:600;margin-bottom:6px}
    .upload-card p{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.7}
    .dropzone{border:2px dashed var(--borders);border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px}
    .dropzone:hover,.dropzone.over{border-color:#2563EB;background:var(--bluebg)}
    .dropzone.loaded{border-style:solid;border-color:#16a34a;background:var(--greenbg)}
    .dropzone i{font-size:28px;display:block;margin-bottom:8px;color:var(--text3)}
    .dropzone.loaded i{color:var(--green)}
    .dropzone p{font-size:13px;font-weight:500;color:var(--text2);margin:0}
    .dropzone small{font-size:11px;color:var(--text3)}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
    .info-cell{background:var(--mist);border-radius:var(--r);padding:8px 10px}
    .info-cell .lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
    .info-cell .val{font-size:12px;font-weight:600;margin-top:2px;color:var(--text)}
    .step-hint{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
    .err-box{background:var(--redbg);border:1px solid #FCA5A5;border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--red);margin-bottom:12px;line-height:1.6}

    /* STATS */
    .stats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .stat{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
    .stat .lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
    .stat .val{font-size:22px;font-weight:700;color:var(--text);line-height:1.2}
    .stat .sub{font-size:10px;color:var(--text3)}

    /* SEASON BAR */
    .sbar{background:var(--navy);border-radius:8px;padding:9px 14px;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .sbar-lbl{font-size:10px;font-weight:700;color:#93B4CC;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
    .schips{display:flex;gap:4px;flex:1;flex-wrap:wrap}
    .schip{flex:1;min-width:50px;text-align:center;background:var(--navy2);border:1px solid var(--navy3);border-radius:4px;padding:3px 5px}
    .schip .sm{font-size:9px;font-weight:700;color:#93B4CC}
    .schip .pct{font-size:11px;font-weight:700;margin-top:1px}
    .schip.peak .pct{color:#34D399}
    .schip.low .pct{color:#F87171}
    .schip.mid .pct{color:#60A5FA}

    /* TOOLBAR */
    .toolbar{display:flex;gap:7px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
    .toolbar-r{margin-left:auto;display:flex;gap:6px;align-items:center}

    /* TABLE */
    .twrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:auto;max-height:calc(100vh - 300px)}
    table{border-collapse:collapse;width:100%;font-size:12px}
    thead th{padding:6px 8px;font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap;background:var(--mist);border-bottom:1px solid var(--borders);position:sticky;top:0;z-index:2;text-transform:uppercase;letter-spacing:.04em}
    thead th.r{text-align:right}
    thead th.c{text-align:center}
    th.pin,td.pin{position:sticky;left:0;z-index:1;background:var(--mist);border-right:1px solid var(--borders)}
    td.pin{background:var(--white)}
    thead th.pin{z-index:3}
    tr:hover td{background:#F8FAFB}
    tr:hover td.pin{background:#F0F4F8}
    tbody td{padding:5px 8px;border-bottom:.5px solid var(--border);vertical-align:middle;white-space:nowrap}
    .plm-keep{color:var(--green);font-weight:600}
    .plm-watch{color:var(--amber);font-weight:600}
    .plm-drop{color:var(--red);font-weight:600}
    .idx-in{width:56px;text-align:center;font-weight:600;font-size:12px;padding:2px 4px}
    .idx-in.changed{background:var(--amberbg);border-color:var(--amberbd);color:var(--amber)}
    td.fc-auto{text-align:right;cursor:pointer;color:var(--text2)}
    td.fc-auto:hover{background:var(--bluebg)!important;color:var(--blue)}
    td.fc-hard{text-align:right;cursor:pointer;background:var(--amberbg)!important;color:var(--amber);font-weight:600;border-left:2px solid var(--amberbd)}
    td.fc-hard:hover{background:#FEF08A!important}
    td.fc-edit{text-align:right;background:var(--bluebg)!important;padding:0}
    td.fc-edit input{border:none;background:transparent;width:100%;text-align:right;padding:5px 8px;font-weight:600;color:var(--blue);font-size:12px;font-family:var(--font);outline:none}
    tfoot td{padding:6px 8px;font-weight:700;font-size:12px;background:var(--mist);border-top:1px solid var(--borders)}
    tfoot td.pin{background:#E4EAF2}
    .hint{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.8}
    .badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:600}
    .badge-ok{background:var(--greenbg);color:var(--green)}
    .badge-warn{background:var(--amberbg);color:var(--amber)}

    @media(max-width:700px){.bar-sub{display:none}.page{padding:10px 12px}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

/* ── CONSTANTS ── */
const LS_DATA  = "tcc_fc_nsdata_v3";
const LS_EDITS = "tcc_fc_edits_v3";
const LS_META  = "tcc_fc_meta_v3";

const MONTHS = ["Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb"];
const MFULL  = {Jul:"July",Aug:"August",Sep:"September",Oct:"October",Nov:"November",Dec:"December",Jan:"January",Feb:"February"};
const DAMPEN = 0.15;
const SEASON = {Jan:.08124,Feb:.11253,Mar:.08728,Apr:.10996,May:.05998,Jun:.08187,
                Jul:.08089,Aug:.10068,Sep:.08182,Oct:.08021,Nov:.05216,Dec:.07138};

const maxS = Math.max(...MONTHS.map(m=>SEASON[m]));
const minS = Math.min(...MONTHS.map(m=>SEASON[m]));
const chipClass = m => SEASON[m]===maxS?"peak":SEASON[m]===minS?"low":"mid";

/* Formula: Wtd Avg × Index × (1 + 0.15 × season_rate) */
function fc(wm,idx,m){ return wm>0 ? Math.round(wm*(idx||1)*(1+DAMPEN*SEASON[m])) : 0; }

/* Infer brand from description */
function inferBrand(desc){
  const d=(desc||"").toUpperCase();
  if(d.includes("(N) RSV")||(/^RSV /i.test(desc))||(/^\(N\) RSV/i.test(desc))) return "Reserveage";
  if(d.includes("(N) RVT")||(/^RVT /i.test(desc))||(/^\(N\) RVT/i.test(desc))) return "ResVitale";
  if(/^TWL /i.test(desc)||d.includes("TWL ")) return "Twinlab";
  if(/^MTB /i.test(desc)||d.startsWith("METABOLIFE")) return "Metabolife";
  if(/^EU /i.test(desc)) return "EU";
  if(/^ABG /i.test(desc)||/^CA ABG/i.test(desc)) return "ABG";
  if(/^ALV /i.test(desc)) return "Alvita";
  if(/^RBY /i.test(desc)) return "Ruby";
  return "Other";
}

/* Parse NS export Excel/CSV */
function parseNSExport(buf, filename){
  const wb = XLSX.read(buf,{type:"array"});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  if(rows.length<2) throw new Error("File appears empty.");

  // Find header row (first row where we can identify key columns)
  let headerIdx=0;
  let colMap={};
  for(let i=0;i<Math.min(rows.length,5);i++){
    const r=rows[i].map(c=>String(c||"").toLowerCase().trim());
    const wm=r.findIndex(c=>c.includes("weighted monthly")||c.includes("weighted avg"));
    const sku=r.findIndex(c=>c.includes("base item name")||c.includes("item name")||c==="sku"||c.includes("item id"));
    const desc=r.findIndex(c=>c.includes("description")&&!c.includes("sku"));
    if(wm>=0){
      headerIdx=i;
      colMap={
        sku: sku>=0?sku:(r.findIndex(c=>c.includes("base item"))),
        wm,
        desc: desc>=0?desc:-1,
        plm: r.findIndex(c=>c.includes("plm")),
        brand: r.findIndex(c=>c.includes("brand")),
      };
      break;
    }
  }
  if(!('wm' in colMap)) throw new Error(`Could not find "Weighted Monthly Qty" column.\n\nColumns found: ${rows[0].filter(Boolean).join(", ")}\n\nMake sure you're uploading the NetSuite saved search export (search #2749).`);

  // Pivot by SKU
  const pivot={};
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i];
    const rawSku=String(row[colMap.sku]||"").trim();
    if(!rawSku||isNaN(+rawSku)||+rawSku===0) continue;
    const sku=rawSku;
    const wm=parseFloat(row[colMap.wm])||0;
    if(wm<=0) continue;
    if(!pivot[sku]){
      const desc=colMap.desc>=0?String(row[colMap.desc]||""):String(row[colMap.sku+1]||"");
      const plmRaw=colMap.plm>=0?String(row[colMap.plm]||""):"";
      const brandRaw=colMap.brand>=0?String(row[colMap.brand]||""):"";
      pivot[sku]={sku,description:desc,brand:brandRaw||inferBrand(desc),plm:plmRaw,weightedMonthly:0};
    }
    pivot[sku].weightedMonthly+=wm;
  }
  const items=Object.values(pivot).sort((a,b)=>a.description.localeCompare(b.description));
  if(!items.length) throw new Error("No items with Weighted Monthly Qty > 0 found. Check the file.");
  return items;
}

/* ── UPLOAD SCREEN ── */
function UploadScreen({onLoad,savedMeta}){
  const [dragging,setDragging]=useState(false);
  const [file,setFile]=useState(null);
  const [err,setErr]=useState("");
  const inputRef=useRef(null);

  const processFile=async(f)=>{
    setFile(f); setErr("");
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const items=parseNSExport(ev.target.result,f.name);
        const meta={filename:f.name,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),count:items.length};
        localStorage.setItem(LS_DATA,JSON.stringify(items));
        localStorage.setItem(LS_META,JSON.stringify(meta));
        onLoad(items,meta);
      }catch(e){ setErr(e.message); }
    };
    reader.readAsArrayBuffer(f);
  };

  const drop=e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer.files[0];if(f)processFile(f);};

  return (
    <div className="upload-wrap">
      <div className="upload-card">
        <h2>TCC Demand Planning — Forecast</h2>
        <p>Upload your NetSuite saved search export (search #2749) to build your July–February forecast.<br/>
        Supports <strong>.xlsx</strong> and <strong>.csv</strong> files.</p>

        {savedMeta&&(
          <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:6,padding:"10px 12px",marginBottom:14,fontSize:12,color:"#1D4ED8"}}>
            Previously loaded: <strong>{savedMeta.filename}</strong> ({savedMeta.count} SKUs, {savedMeta.date})
            <button className="btn-sm" style={{marginLeft:8}} onClick={()=>onLoad(JSON.parse(localStorage.getItem(LS_DATA)||"[]"),savedMeta)}>
              Use this →
            </button>
          </div>
        )}

        {err&&<div className="err-box" style={{whiteSpace:"pre-wrap"}}>⚠ {err}</div>}

        <p className="step-hint">Step 1 — Export from NetSuite</p>
        <p style={{fontSize:11,color:"var(--text3)",marginBottom:14,lineHeight:1.7}}>
          In NetSuite: <strong>Reports → Saved Searches → Search #2749</strong> → click <em>Export (Excel)</em> or <em>CSV</em>.<br/>
          The file must include the <strong>"Weighted Monthly Qty"</strong> and <strong>"Base Item Name"</strong> columns.
        </p>

        <p className="step-hint">Step 2 — Upload here</p>
        <div className={`dropzone${dragging?" over":""}${file?" loaded":""}`}
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)}
          onDrop={drop}
          onClick={()=>inputRef.current?.click()}>
          <i className="ti ti-upload" aria-hidden="true"/>
          <p>{file?file.name:"Drop your NS export here"}</p>
          <small>{file?"Click to replace":"or click to browse"}</small>
          <input ref={inputRef} type="file" accept=".xlsx,.csv,.xls" style={{display:"none"}} onChange={e=>{if(e.target.files[0])processFile(e.target.files[0]);}}/>
        </div>

        <div className="info-grid">
          <div className="info-cell"><div className="lbl">Forecast window</div><div className="val">July → February</div></div>
          <div className="info-cell"><div className="lbl">Seasonality</div><div className="val">AVG ALL (built-in)</div></div>
          <div className="info-cell"><div className="lbl">Formula</div><div className="val" style={{fontSize:10}}>Wtd Avg × Index × (1 + 0.15 × Season%)</div></div>
          <div className="info-cell"><div className="lbl">Data stored</div><div className="val">Browser only</div></div>
        </div>
      </div>
    </div>
  );
}

/* ── FORECAST TABLE ── */
function ForecastTable({items,meta,onClear}){
  const [edits,setEdits]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_EDITS)||"{}");}catch{return{};}});
  const [search,setSearch]=useState("");
  const [fBrand,setFBrand]=useState("all");
  const [fPLM,setFPLM]=useState("all");
  const [editCell,setEditCell]=useState(null);
  const [editVal,setEditVal]=useState("");
  const cellRef=useRef(null);

  useEffect(()=>{localStorage.setItem(LS_EDITS,JSON.stringify(edits));},[edits]);

  const getE=useCallback(sku=>edits[sku]||{index:1,overrides:{}},[edits]);
  const setIdx=(sku,v)=>setEdits(p=>({...p,[sku]:{...(p[sku]||{index:1,overrides:{}}),index:parseFloat(v)||1}}));
  const setOv=(sku,m,v)=>setEdits(p=>{const e=p[sku]||{index:1,overrides:{}};return{...p,[sku]:{...e,overrides:{...e.overrides,[m]:Math.round(parseFloat(v))}}};});
  const clrOv=(sku,m)=>setEdits(p=>{const e=p[sku]||{index:1,overrides:{}};const o={...e.overrides};delete o[m];return{...p,[sku]:{...e,overrides:o}};});
  const startEdit=(sku,m,cur)=>{setEditCell({sku,m});setEditVal(String(cur));setTimeout(()=>cellRef.current?.select(),25);};
  const commit=()=>{if(!editCell)return;const v=parseFloat(editVal);if(!isNaN(v)&&v>=0)setOv(editCell.sku,editCell.m,v);setEditCell(null);};

  const exportXL=()=>{
    const hdr=["SKU","Description","Brand","PLM","Wtd Avg (NS)","Index",...MONTHS.map(m=>MFULL[m])];
    const body=filtered.map(it=>{const e=getE(it.sku);return[it.sku,it.description,it.brand,it.plm,it.weightedMonthly,e.index,...MONTHS.map(m=>e.overrides[m]!=null?e.overrides[m]:fc(it.weightedMonthly,e.index,m))];});
    const tot=["","TOTAL","","","","",...MONTHS.map(m=>totals[m])];
    const ws=XLSX.utils.aoa_to_sheet([hdr,...body,tot]);
    ws["!cols"]=[8,36,12,8,8,6,...MONTHS.map(()=>9)].map(w=>({wch:w}));
    // Seasonality reference sheet
    const sHdr=["Month","AVG ALL %","Seasonal Factor"];
    const sRows=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].map(m=>[m,(SEASON[m]*100).toFixed(2)+"%",(1+DAMPEN*SEASON[m]).toFixed(4)]);
    const ws2=XLSX.utils.aoa_to_sheet([sHdr,...sRows]);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Forecast Jul-Feb");
    XLSX.utils.book_append_sheet(wb,ws2,"Seasonality Reference");
    XLSX.writeFile(wb,"TCC_Forecast_July2026.xlsx");
  };

  const brands=useMemo(()=>[...new Set(items.map(i=>i.brand).filter(Boolean))].sort(),[items]);
  const plms=useMemo(()=>[...new Set(items.map(i=>i.plm).filter(Boolean))].sort(),[items]);

  const filtered=useMemo(()=>items.filter(it=>{
    if(fBrand!=="all"&&it.brand!==fBrand)return false;
    if(fPLM!=="all"&&it.plm!==fPLM)return false;
    if(search){const t=search.toLowerCase();return it.sku.includes(t)||it.description.toLowerCase().includes(t)||(it.brand||"").toLowerCase().includes(t);}
    return true;
  }),[items,fBrand,fPLM,search]);

  const totals=useMemo(()=>{const t={};MONTHS.forEach(m=>{t[m]=filtered.reduce((s,it)=>{const e=getE(it.sku);return s+(e.overrides[m]!=null?e.overrides[m]:fc(it.weightedMonthly,e.index,m));},0);});return t;},[filtered,edits]);
  const totalUnits=MONTHS.reduce((s,m)=>s+(totals[m]||0),0);
  const modCount=Object.keys(edits).filter(sku=>{const e=edits[sku];return e.index!==1||Object.keys(e.overrides||{}).length>0;}).length;
  const plmCls=p=>p?.includes("4")?"plm-drop":p?.includes("3")?"plm-watch":"plm-keep";

  return (
    <div className="page">
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,gap:8,flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:16,fontWeight:600,color:"var(--text)"}}>July 2026 forecast</div>
          <div style={{fontSize:11,color:"var(--text3)"}}>
            {meta.filename} · {meta.count} SKUs · uploaded {meta.date}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <button className="btn-ghost btn-sm" onClick={onClear}>↑ Upload new file</button>
          <button className="btn-sm btn-danger" onClick={()=>{if(confirm("Reset all index and override edits?")){setEdits({});localStorage.removeItem(LS_EDITS);}}}>↺ Reset edits</button>
          <button className="btn-primary" onClick={exportXL}>⬇ Export Excel</button>
        </div>
      </div>

      {/* Stats */}
      <div className="stats">
        {[{lbl:"SKUs loaded",val:items.length,sub:"from NS export"},
          {lbl:"8-month total",val:totalUnits.toLocaleString(),sub:"forecast units"},
          {lbl:"Adjusted SKUs",val:modCount,sub:"index or override"},
          {lbl:"Showing",val:filtered.length,sub:`of ${items.length} SKUs`}
        ].map(s=>(
          <div key={s.lbl} className="stat">
            <div className="lbl">{s.lbl}</div>
            <div className="val">{s.val}</div>
            <div className="sub">{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Seasonality bar */}
      <div className="sbar">
        <span className="sbar-lbl">Seasonality · AVG ALL</span>
        <div className="schips">
          {MONTHS.map(m=>(
            <div key={m} className={`schip ${chipClass(m)}`}>
              <div className="sm">{m}</div>
              <div className="pct">{(SEASON[m]*100).toFixed(1)}%</div>
            </div>
          ))}
        </div>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <input type="search" placeholder="Search SKU, name or brand…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:210}}/>
        <select value={fBrand} onChange={e=>setFBrand(e.target.value)}>
          <option value="all">All brands</option>
          {brands.map(b=><option key={b} value={b}>{b}</option>)}
        </select>
        <select value={fPLM} onChange={e=>setFPLM(e.target.value)}>
          <option value="all">All PLM stages</option>
          {plms.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        <div className="toolbar-r">
          <span style={{fontSize:10,color:"var(--text3)"}}>
            Click cell to override · right-click <span style={{background:"var(--amberbg)",color:"var(--amber)",padding:"1px 5px",borderRadius:3,fontSize:10}}>amber</span> to reset
          </span>
        </div>
      </div>

      {/* Table */}
      <div className="twrap">
        <table>
          <thead>
            <tr>
              <th className="pin" style={{minWidth:56,textAlign:"left"}}>SKU</th>
              <th style={{minWidth:200,textAlign:"left"}}>Description</th>
              <th style={{minWidth:88,textAlign:"left"}}>Brand</th>
              <th className="c" style={{minWidth:44}}>PLM</th>
              <th className="r" style={{minWidth:68}}>Wtd avg</th>
              <th className="c" style={{minWidth:70}}>
                Index
                <div style={{fontSize:9,fontWeight:400,textTransform:"none",letterSpacing:0,color:"var(--text3)",marginTop:2}}>editable</div>
              </th>
              {MONTHS.map(m=>(
                <th key={m} className="r" style={{minWidth:64}}>
                  {m}
                  <div style={{fontSize:9,fontWeight:700,textTransform:"none",letterSpacing:0,marginTop:2,
                    color:SEASON[m]===maxS?"#16a34a":SEASON[m]===minS?"#dc2626":"var(--text3)"}}>
                    {(SEASON[m]*100).toFixed(1)}%
                  </div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(it=>{
              const e=getE(it.sku);
              return (
                <tr key={it.sku}>
                  <td className="pin" style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)"}}>{it.sku}</td>
                  <td style={{maxWidth:220,overflow:"hidden",textOverflow:"ellipsis"}} title={it.description}>{it.description}</td>
                  <td style={{color:"var(--text3)",fontSize:11}}>{it.brand}</td>
                  <td style={{textAlign:"center"}}>
                    <span className={plmCls(it.plm)}>{it.plm?.split(" - ")[0]||"—"}</span>
                  </td>
                  <td style={{textAlign:"right",color:"var(--text2)"}}>{it.weightedMonthly.toLocaleString()}</td>
                  <td style={{textAlign:"center"}}>
                    <input type="number" className={`idx-in${e.index!==1?" changed":""}`}
                      value={e.index} step={0.05} min={0}
                      onChange={ev=>setIdx(it.sku,ev.target.value)}/>
                  </td>
                  {MONTHS.map(m=>{
                    const isEdit=editCell?.sku===it.sku&&editCell?.m===m;
                    const over=e.overrides[m];
                    const auto=fc(it.weightedMonthly,e.index,m);
                    const disp=over!=null?over:auto;
                    if(isEdit)return(
                      <td key={m} className="fc-edit">
                        <input ref={cellRef} type="number" value={editVal}
                          onChange={ev=>setEditVal(ev.target.value)}
                          onBlur={commit}
                          onKeyDown={ev=>{if(ev.key==="Enter"||ev.key==="Tab"){ev.preventDefault();commit();}if(ev.key==="Escape")setEditCell(null);}}/>
                      </td>
                    );
                    return(
                      <td key={m} className={over!=null?"fc-hard":"fc-auto"}
                        onClick={()=>startEdit(it.sku,m,disp)}
                        onContextMenu={ev=>{ev.preventDefault();if(over!=null)clrOv(it.sku,m);}}
                        title={over!=null?`Hard-keyed: ${disp.toLocaleString()}\nRight-click to revert to formula`:`Auto: ${disp.toLocaleString()}\nClick to override`}>
                        {disp.toLocaleString()}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr>
              <td className="pin" style={{fontSize:10,fontWeight:700,letterSpacing:".04em",textTransform:"uppercase"}}>Total</td>
              <td colSpan={5} style={{fontSize:10,color:"var(--text3)",fontWeight:400}}>{filtered.length} SKUs · July–February 2026</td>
              {MONTHS.map(m=><td key={m} style={{textAlign:"right"}}>{totals[m].toLocaleString()}</td>)}
            </tr>
          </tfoot>
        </table>
      </div>

      <div className="hint">
        <strong>Index</strong>: multiplier per SKU — scales all months proportionally (amber = modified from 1.0).
        &nbsp;<strong>Monthly cells</strong>: click to type a specific override value.
        &nbsp;Right-click amber cell to revert to formula.
        &nbsp;All edits save automatically to your browser.
        &nbsp;Use "Export Excel" to download for sharing.
      </div>
    </div>
  );
}

/* ── ROOT ── */
function App(){
  const [items,setItems]=useState(null);
  const [meta,setMeta]=useState(null);
  const [savedMeta,setSavedMeta]=useState(null);
  const [screen,setScreen]=useState("upload"); // "upload" | "table"

  useEffect(()=>{
    try{
      const m=JSON.parse(localStorage.getItem(LS_META)||"null");
      if(m) setSavedMeta(m);
    }catch{}
  },[]);

  const handleLoad=(its,m)=>{setItems(its);setMeta(m);setScreen("table");};
  const handleClear=()=>setScreen("upload");

  return (
    <>
      <nav className="bar">
        <div className="bar-logo">TCC <span>Demand</span></div>
        <div className="bar-sub">Forecast · Jul → Feb · Wtd Avg × Index × (1 + 0.15 × Season%)</div>
        {screen==="table"&&(
          <div className="bar-right">
            <span style={{fontSize:11,color:"#93B4CC"}}>{meta?.date}</span>
          </div>
        )}
      </nav>
      {screen==="upload"
        ? <UploadScreen onLoad={handleLoad} savedMeta={savedMeta}/>
        : <ForecastTable items={items} meta={meta} onClear={handleClear}/>
      }
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<!-- Tabler icons for upload icon -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
</body>
</html>
