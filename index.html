<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TCC Demand Planning</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0F1C2E;--navy2:#1A2D44;--navy3:#253D58;
      --white:#fff;--mist:#F0F4F8;--border:#D8E2EE;--borders:#B0C4D8;
      --text:#0F1C2E;--text2:#3A4F63;--text3:#7A90A4;
      --blue:#2563EB;--bluebg:#EFF6FF;--bluebd:#BFDBFE;
      --green:#166534;--greenbg:#DCFCE7;--greenbd:#86EFAC;
      --amber:#B45309;--amberbg:#FEF3C7;--amberbd:#FCD34D;
      --red:#991B1B;--redbg:#FEE2E2;--redbd:#FCA5A5;
      --purple:#5B21B6;--purplebg:#EDE9FE;--purplebd:#C4B5FD;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      --mono:'SF Mono','Consolas','Monaco',monospace;--r:5px;
    }
    html{font-size:13px}
    body{font-family:var(--font);background:var(--mist);color:var(--text);line-height:1.45;min-height:100vh}
    /* NAV */
    .bar{background:var(--navy);padding:0 20px;display:flex;align-items:center;gap:0;height:50px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .bar-logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;white-space:nowrap;margin-right:16px;flex-shrink:0}
    .bar-logo span{color:#60A5FA}
    .tabs{display:flex;height:100%;overflow-x:auto}
    .tab-btn{background:none;border:none;border-radius:0;padding:0 16px;font-size:12px;font-weight:500;color:#93B4CC;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
    .tab-btn:hover{color:#fff;background:var(--navy2)}
    .tab-btn.active{color:#fff;border-bottom-color:#60A5FA}
    .bar-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0;padding-left:12px}
    /* BUTTONS */
    button{cursor:pointer;font-family:var(--font);font-size:12px;font-weight:500;border-radius:var(--r);border:1px solid var(--borders);background:var(--white);color:var(--text2);padding:5px 12px;transition:background .12s;white-space:nowrap}
    button:hover:not(:disabled){background:var(--mist)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .btn-primary{background:#2563EB;color:#fff;border-color:#1D4ED8}
    .btn-primary:hover:not(:disabled){background:#1D4ED8}
    .btn-ghost{background:transparent;border-color:#3A5472;color:#93B4CC}
    .btn-ghost:hover:not(:disabled){background:var(--navy3);color:#fff}
    .btn-sm{padding:3px 8px;font-size:11px}
    .btn-danger{color:var(--red);border-color:var(--redbd)}
    .btn-danger:hover:not(:disabled){background:var(--redbg)}
    .seg{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .seg button{border:none;border-radius:0;padding:4px 10px;font-size:11px;background:var(--white);color:var(--text3)}
    .seg button.on{background:var(--navy);color:#fff}
    .seg button+button{border-left:1px solid var(--border)}
    /* INPUTS */
    input,select{font-family:var(--font);font-size:12px;border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;background:var(--white);color:var(--text)}
    input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button{opacity:.4}
    /* UPLOAD */
    .upload-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px);padding:24px}
    .upload-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:32px;max-width:520px;width:100%;box-shadow:0 1px 4px rgba(15,28,46,.08)}
    .upload-card h2{font-size:16px;font-weight:600;margin-bottom:6px}
    .upload-card .sub{font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.7}
    .dropzone{border:2px dashed var(--borders);border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:12px}
    .dropzone:hover,.dropzone.over{border-color:var(--blue);background:var(--bluebg)}
    .dropzone.loaded{border-style:solid;border-color:#16a34a;background:var(--greenbg)}
    .dz-icon{font-size:26px;display:block;margin-bottom:6px;color:var(--text3)}
    .dropzone.loaded .dz-icon{color:var(--green)}
    .dropzone p{font-size:13px;font-weight:500;color:var(--text2);margin:0}
    .dropzone small{font-size:11px;color:var(--text3)}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    .info-cell{background:var(--mist);border-radius:var(--r);padding:8px 10px}
    .info-cell .lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
    .info-cell .val{font-size:12px;font-weight:600;margin-top:2px}
    .prev-banner{background:var(--bluebg);border:1px solid var(--bluebd);border-radius:var(--r);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .err-box{background:var(--redbg);border:1px solid var(--redbd);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:10px;white-space:pre-wrap}
    .step-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
    /* PAGE */
    .page{padding:16px 20px}
    /* STATS */
    .stats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .stat{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:120px}
    .stat .lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
    .stat .val{font-size:20px;font-weight:700;color:var(--text);line-height:1.2}
    .stat .sub{font-size:10px;color:var(--text3)}
    /* SEASON BAR */
    .sbar{background:var(--navy);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .sbar-lbl{font-size:10px;font-weight:700;color:#93B4CC;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
    .schips{display:flex;gap:4px;flex:1;flex-wrap:wrap}
    .schip{flex:1;min-width:48px;text-align:center;background:var(--navy2);border:1px solid var(--navy3);border-radius:4px;padding:3px 4px}
    .schip .sm{font-size:9px;font-weight:700;color:#93B4CC}
    .schip .pct{font-size:11px;font-weight:700;margin-top:1px}
    .schip.peak .pct{color:#34D399}.schip.low .pct{color:#F87171}.schip.mid .pct{color:#60A5FA}
    /* TOOLBAR */
    .toolbar{display:flex;gap:7px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
    .toolbar-r{margin-left:auto;display:flex;gap:6px;align-items:center}
    /* ADD SKU PANEL */
    .add-panel{background:var(--bluebg);border:1px solid var(--bluebd);border-radius:8px;padding:12px 14px;margin-bottom:10px}
    .add-panel h4{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--blue)}
    .add-panel .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
    .add-panel .field{display:flex;flex-direction:column;gap:4px}
    .add-panel .field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
    .add-panel .preview{background:var(--white);border:1px solid var(--bluebd);border-radius:var(--r);padding:8px 12px;flex:1;min-width:200px}
    .add-panel .preview .name{font-size:13px;font-weight:600}
    .add-panel .preview .meta{font-size:11px;color:var(--text3);margin-top:2px}
    /* TABLE */
    .twrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:auto;max-height:calc(100vh - 320px)}
    table{border-collapse:collapse;width:100%;font-size:12px}
    thead th{padding:5px 8px;font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap;background:var(--mist);border-bottom:1px solid var(--borders);position:sticky;top:0;z-index:2;text-transform:uppercase;letter-spacing:.04em;text-align:left}
    thead th.r{text-align:right}thead th.c{text-align:center}
    th.pin,td.pin{position:sticky;left:0;z-index:1;background:var(--mist);border-right:1px solid var(--borders)}
    td.pin{background:var(--white)}thead th.pin{z-index:3}
    tr:hover td{background:#F8FAFB}tr:hover td.pin{background:#F0F4F8}
    tbody td{padding:5px 8px;border-bottom:.5px solid var(--border);vertical-align:middle;white-space:nowrap}
    .plm-dev{color:var(--purple);font-weight:600;font-size:11px}
    .plm-keep{color:var(--green);font-weight:600;font-size:11px}
    .plm-watch{color:var(--amber);font-weight:600;font-size:11px}
    .plm-drop{color:#9CA3AF;font-weight:500;font-size:11px}
    .idx-in{width:54px;text-align:center;font-weight:600;font-size:12px;padding:2px 4px}
    .idx-in.changed{background:var(--amberbg);border-color:var(--amberbd);color:var(--amber)}
    td.fc-auto{text-align:right;cursor:pointer;color:var(--text2)}
    td.fc-auto:hover{background:var(--bluebg)!important;color:var(--blue)}
    td.fc-hard{text-align:right;cursor:pointer;background:var(--amberbg)!important;color:var(--amber);font-weight:600;border-left:2px solid var(--amberbd)}
    td.fc-hard:hover{background:#FEF08A!important}
    td.fc-edit{text-align:right;background:var(--bluebg)!important;padding:0}
    td.fc-edit input{border:none;background:transparent;width:100%;text-align:right;padding:5px 8px;font-weight:600;color:var(--blue);font-size:12px;font-family:var(--font);outline:none}
    tfoot td{padding:6px 8px;font-weight:700;font-size:12px;background:var(--mist);border-top:1px solid var(--borders)}
    tfoot td.pin{background:#E4EAF2}
    .hint{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.8}
    /* ACTUAL CELLS */
    .mc{padding:5px 8px;border-bottom:.5px solid var(--border);text-align:right;vertical-align:top;min-width:90px}
    .mc .fc-row{font-size:11px;color:var(--text3);margin-bottom:1px}
    .mc .act-row{font-size:11px;font-weight:700}
    .mc .var-row{font-size:10px;font-weight:500;margin-top:2px}
    .mc .py-row{font-size:10px;color:#2563EB;margin-top:1px}
    .mc.future{background:#F8FAFB}.mc.on-track{background:#F0FDF4}.mc.behind{background:#FFFBEB}.mc.miss{background:#FFF1F2}
    .mh{text-align:center;padding:4px 6px;min-width:90px}
    .mh .yr{font-size:9px;color:var(--text3);font-weight:400}
    .notice{background:var(--amberbg);border:1px solid var(--amberbd);border-radius:var(--r);padding:8px 12px;font-size:11px;color:var(--amber);margin-bottom:10px}
    .legend{display:flex;gap:8px;align-items:center;font-size:10px;color:var(--text3)}
    .ld{width:10px;height:10px;border-radius:2px;display:inline-block}
    .il-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:var(--r);background:var(--greenbg);border:1px solid var(--greenbd);color:var(--green);cursor:default}
    .dollar-mode td.fc-auto,.dollar-mode td.fc-hard{color:var(--blue)}
    @media(max-width:700px){.page{padding:10px 12px}.bar-logo{font-size:13px}}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useRef} = React;

/* ══ STORAGE KEYS ══ */
const LS_NS    = "tcc_ns_v4";
const LS_EDITS = "tcc_edits_v4";
const LS_NMETA = "tcc_nmeta_v4";
const LS_IL    = "tcc_il_v4";   // item list
const LS_ILMETA= "tcc_ilmeta_v4";
const LS_SALES = "tcc_sales_v2";
const LS_SMETA = "tcc_smeta_v2";
const LS_HIDDEN= "tcc_hidden_v1";
const LS_HIST  = "tcc_hist_fc_v1";  // uploaded historical forecast (June Excel file)
const LS_HMETA = "tcc_hist_meta_v1";

/* ── PASSCODE SECURITY ─────────────────────────────────────────────────────
   Default passcode: TCC2026   (page is VIEW-ONLY until unlocked)
   To change the passcode:
     1. Open browser console (F12) on any page
     2. Run this line and copy the result:
        crypto.subtle.digest('SHA-256',new TextEncoder().encode('YourNewPasscode'))
          .then(h=>console.log([...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('')))
     3. Replace PASSCODE_HASH below with the new hash
     4. Re-upload index.html to GitHub
   For email-based access, a backend (Firebase/Supabase) would be needed —
   contact your IT team to set that up as a future upgrade.
   ─────────────────────────────────────────────────────────────────────── */
const PASSCODE_HASH="778055870e650a9a08d2e034e1671e328354f815ca2c1b17579df52cd7bdf443";
async function checkPasscode(p){
  const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(p));
  return[...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,"0")).join("")===PASSCODE_HASH;
}

/* ══ CONSTANTS ══
   Formula: Monthly FC = Weighted Monthly Qty (from NS saved search #2749)
            × Index (planner multiplier, default 1.0)
            × (1 + 0.15 × Season%) where Season% = AVG ALL from Seasonality tab
   Seasonality source: company AVG ALL tab (Jul–Feb 8-month rolling window)
*/
const MONTHS = ["Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb"];
const MFULL  = {Jul:"July",Aug:"August",Sep:"September",Oct:"October",Nov:"November",Dec:"December",Jan:"January",Feb:"February"};
const DAMPEN = 0.15;
const SEASON = {Jan:.08124,Feb:.11253,Mar:.08728,Apr:.10996,May:.05998,Jun:.08187,
                Jul:.08089,Aug:.10068,Sep:.08182,Oct:.08021,Nov:.05216,Dec:.07138};
const maxS=Math.max(...MONTHS.map(m=>SEASON[m]));
const minS=Math.min(...MONTHS.map(m=>SEASON[m]));
const chipCls=m=>SEASON[m]===maxS?"peak":SEASON[m]===minS?"low":"mid";

const FC_CAL = {
  Jul:{cy:[2026,"Jul"],py:[2025,"Jul"]},Aug:{cy:[2026,"Aug"],py:[2025,"Aug"]},
  Sep:{cy:[2026,"Sep"],py:[2025,"Sep"]},Oct:{cy:[2026,"Oct"],py:[2025,"Oct"]},
  Nov:{cy:[2026,"Nov"],py:[2025,"Nov"]},Dec:{cy:[2026,"Dec"],py:[2025,"Dec"]},
  Jan:{cy:[2027,"Jan"],py:[2026,"Jan"]},Feb:{cy:[2027,"Feb"],py:[2026,"Feb"]},
};

// Actual vs Forecast tab: June (past, uses uploaded FC) + Jul-Feb (modeled FC)
const ACT_MONTHS = ["Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb"];
const ACT_FC_CAL = {
  Jun:{cy:[2026,"Jun"],py:[2025,"Jun"],tag:"past"},      // historical — use uploaded forecast
  Jul:{cy:[2026,"Jul"],py:[2025,"Jul"],tag:"current"},   // in progress — use modeled FC
  Aug:{cy:[2026,"Aug"],py:[2025,"Aug"],tag:"future"},
  Sep:{cy:[2026,"Sep"],py:[2025,"Sep"],tag:"future"},
  Oct:{cy:[2026,"Oct"],py:[2025,"Oct"],tag:"future"},
  Nov:{cy:[2026,"Nov"],py:[2025,"Nov"],tag:"future"},
  Dec:{cy:[2026,"Dec"],py:[2025,"Dec"],tag:"future"},
  Jan:{cy:[2027,"Jan"],py:[2026,"Jan"],tag:"future"},
  Feb:{cy:[2027,"Feb"],py:[2026,"Feb"],tag:"future"},
};
const MONTH_NORM={January:"Jan",February:"Feb",March:"Mar",April:"Apr",May:"May",
  June:"Jun",July:"Jul",August:"Aug",September:"Sep",October:"Oct",November:"Nov",December:"Dec"};

// PLM display labels
const PLM_TEXT = {"1":"Dev","2":"Keep","3":"Watch","4":"Drop"};
const PLM_CLS  = {"1":"plm-dev","2":"plm-keep","3":"plm-watch","4":"plm-drop"};
function plmNum(p){return (p||"").split(" - ")[0];}
function plmLabel(p){const n=plmNum(p);return PLM_TEXT[n]||n||"—";}
function plmCls(p){const n=plmNum(p);return PLM_CLS[n]||"";}

/* ══ FORMULA ══ */
function fc(wm,idx,m){return wm>0?Math.round(wm*(idx||1)*(1+DAMPEN*SEASON[m])):0;}
function inferBrand(d){
  if(!d)return"Other";
  if(/^rvt|resvitale/i.test(d))return"ResVitale";
  if(/rsv|reserveage/i.test(d))return"Reserveage";
  if(/^twl|twinlab/i.test(d))return"Twinlab";
  if(/^mtb|metabolife/i.test(d))return"Metabolife";
  if(/^eu /i.test(d))return"EU";
  if(/^abg|^ca abg/i.test(d))return"ABG";
  if(/^alv|alvita/i.test(d))return"Alvita";
  return"Other";
}

// Dollar formatting
function fmtDollar(v){
  if(!v||v===0)return"—";
  if(v>=1000000)return"$"+(v/1000000).toFixed(1)+"M";
  if(v>=1000)return"$"+(v/1000).toFixed(0)+"k";
  return"$"+Math.round(v);
}
function fmtMoney(v){return v>0?"$"+Math.round(v).toLocaleString():"—";}

/* ══ PARSERS ══ */
function parseNSExport(buf){
  const wb=XLSX.read(buf,{type:"array"});
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
  if(rows.length<2)throw new Error("File appears empty.");
  let hIdx=0,col={};
  for(let i=0;i<Math.min(rows.length,5);i++){
    const r=rows[i].map(c=>String(c||"").toLowerCase().trim());
    const wm=r.findIndex(c=>c.includes("weighted monthly")||c.includes("weighted avg"));
    const sku=r.findIndex(c=>c.includes("base item")||c==="sku");
    if(wm>=0){hIdx=i;col={sku:sku>=0?sku:0,wm,desc:r.findIndex(c=>c.includes("description")),plm:r.findIndex(c=>c.includes("plm")),brand:r.findIndex(c=>c==="brand")};break;}
  }
  if(!("wm" in col))throw new Error(`Cannot find "Weighted Monthly Qty" column.\nDetected: ${rows[0].filter(Boolean).join(", ")}`);
  const pivot={};
  for(let i=hIdx+1;i<rows.length;i++){
    const row=rows[i];
    const sku=String(row[col.sku]||"").trim();
    if(!sku||isNaN(+sku)||+sku===0)continue;
    const wm=parseFloat(row[col.wm])||0;
    if(wm<=0)continue;
    if(!pivot[sku]){
      const desc=col.desc>=0?String(row[col.desc]||""):"";
      pivot[sku]={sku,description:desc,brand:(col.brand>=0?String(row[col.brand]||"")||""  :"")||inferBrand(desc),plm:col.plm>=0?String(row[col.plm]||""):"",weightedMonthly:0};
    }
    pivot[sku].weightedMonthly+=wm;
  }
  const items=Object.values(pivot).filter(i=>i.weightedMonthly>0).sort((a,b)=>a.description.localeCompare(b.description));
  if(!items.length)throw new Error("No items with Weighted Monthly Qty > 0 found.");
  return items;
}

function parsePlanningList(buf){
  // Finance Planning Item List — used for: Base Price lookup, SKU description/brand lookup, Add new SKU
  // Key: match rows where Name === Base Item Name (exact) to get main item data
  const wb=XLSX.read(buf,{type:"array"});
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
  if(rows.length<2)throw new Error("File appears empty.");
  const hdr=rows[0].map(c=>String(c).toLowerCase().trim());
  const col={
    baseName:hdr.findIndex(c=>c==="base item name"||c.includes("base item")),
    name:hdr.findIndex(c=>c==="name"),
    displayName:hdr.findIndex(c=>c.includes("display name")),
    plm:hdr.findIndex(c=>c.includes("plm stage")||c==="plm stage"),
    brand:hdr.findIndex(c=>c==="brand"),
    basePrice:hdr.findIndex(c=>c==="base price"||c.includes("base price")),
    core:hdr.findIndex(c=>c==="core sku"||c.includes("core sku")),
  };
  if(col.baseName<0||col.name<0)throw new Error(`Cannot find required columns.\nDetected: ${rows[0].filter(Boolean).slice(0,10).join(", ")}`);
  const items={};
  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    const sku=String(row[col.baseName]||"").trim();
    const name=String(row[col.name]||"").trim();
    if(!sku||!name||isNaN(+sku))continue;
    if(name!==sku)continue; // only main item (Name === Base Item Name)
    const bp=parseFloat(row[col.basePrice])||0;
    if(!items[sku]||bp>items[sku].basePrice){
      items[sku]={
        displayName:(col.displayName>=0?String(row[col.displayName]||""):"")||sku,
        brand:col.brand>=0?String(row[col.brand]||""):"",
        plm:col.plm>=0?String(row[col.plm]||""):"",
        basePrice:bp,
        isCore:col.core>=0?["yes","y","true","1"].includes(String(row[col.core]||"").trim().toLowerCase()):true,
      };
    }
  }
  return items;
}

function parseSalesCSV(buf){
  // Read as plain text for reliable large-CSV handling (72K+ rows)
  // PIVOT: SUM all Invoiced Qty rows sharing the same Base Item Name × YEAR × MONTH
  //        This includes ALL customers, ALL channels — exactly like a pivot table in Excel
  let text=new TextDecoder("utf-8").decode(new Uint8Array(buf));
  // Strip UTF-8 BOM if present (common in NetSuite exports)
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.split(/\r?\n/);
  if(lines.length<2)throw new Error("File appears empty.");

  // CSV field parser — handles fields containing quoted commas
  function splitLine(line){
    const out=[];let f="",q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){q=!q;}
      else if(c===","&&!q){out.push(f.trim());f="";}
      else f+=c;
    }
    out.push(f.trim());
    return out;
  }

  const hdr=splitLine(lines[0]).map(c=>c.toLowerCase().trim());
  const col={
    sku:  hdr.findIndex(c=>c.includes("base item name")||c==="base item name"),
    year: hdr.findIndex(c=>c==="year"),
    month:hdr.findIndex(c=>c==="month"),
    channel:hdr.findIndex(c=>c==="channel"),
    qty:  hdr.findIndex(c=>c==="invoiced qty"),   // exact match — avoid matching "Average..." etc.
    desc: hdr.findIndex(c=>c==="description"),
    brand:hdr.findIndex(c=>c==="brand"),
    plm:  hdr.findIndex(c=>c.includes("plm stage")),
  };
  // Fallback for qty if exact match fails
  if(col.qty<0) col.qty=hdr.findIndex(c=>c.includes("invoiced qty"));
  if(col.qty<0||col.sku<0)
    throw new Error(`Missing required columns.\nLooking for: "Base Item Name", "YEAR", "MONTH", "Invoiced Qty"\nFound: ${hdr.slice(0,16).join(", ")}`);

  // ── PIVOT: SUM Invoiced Qty by SKU × Year × Month (and by channel) ──
  const totals   ={};  // "sku|yr|abbr"      → total qty (all channels)
  const byChannel={};  // "sku|yr|abbr|ch"   → qty per channel
  const channels =new Set();
  const skuMeta  ={};
  let rowsProcessed=0;

  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue;
    const row=splitLine(line);

    // Base Item Name (SKU)
    const sku=(row[col.sku]||"").trim();
    if(!sku||sku.toLowerCase().includes("none")||sku==="")continue;

    // Year — must be a 4-digit number 2020–2030
    const yr=parseInt(row[col.year]||"",10);
    if(isNaN(yr)||yr<2020||yr>2030)continue;

    // Month — normalise "March    " → "Mar"
    const abbr=MONTH_NORM[(row[col.month]||"").trim()];
    if(!abbr)continue;

    // Invoiced Qty — strip commas, convert to number
    const qty=parseFloat((row[col.qty]||"").replace(/,/g,""))||0;

    // Channel
    const ch=((row[col.channel]||"").trim())||"Other";
    channels.add(ch);

    // ── Accumulate (this is the pivot SUM) ──
    const tk=`${sku}|${yr}|${abbr}`;
    totals[tk]   =(totals[tk]   ||0)+qty;
    byChannel[`${tk}|${ch}`]=(byChannel[`${tk}|${ch}`]||0)+qty;

    // SKU metadata — capture from first row seen for this SKU
    if(!skuMeta[sku]){
      const d=(col.desc>=0?row[col.desc]||"":"").trim();
      skuMeta[sku]={
        description:d,
        brand:col.brand>=0?(row[col.brand]||"").trim()||inferBrand(d):inferBrand(d),
        plm:col.plm>=0?(row[col.plm]||"").trim():"",
      };
    }
    rowsProcessed++;
  }

  if(rowsProcessed===0)throw new Error("No valid rows found. Check the file format.");

  return{
    totals,
    byChannel,
    channels:[...channels].filter(c=>c&&!c.toLowerCase().includes("none")).sort(),
    skuMeta,
    rowCount:rowsProcessed,              // actual CSV rows processed (not pivot key count)
    pivotKeys:Object.keys(totals).length, // unique SKU × Year × Month combinations
  };
}

/* Parse a historical forecast Excel file (e.g. June forecast)
   Returns: { fcData: {sku: {Jun:453, Jul:454, ...}}, months: ["Jun","Jul",...], filename } */
function parseHistoricalForecast(buf){
  const wb=XLSX.read(buf,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  // Find header row: first row where col 0 = "SKU"
  let headerIdx=-1;const monthCols={};
  for(let i=0;i<Math.min(rows.length,10);i++){
    if(String(rows[i][0]).trim().toLowerCase()==="sku"){
      headerIdx=i;
      for(let j=1;j<rows[i].length;j++){
        const cell=String(rows[i][j]).trim();
        const abbr=MONTH_NORM[cell];
        if(abbr)monthCols[abbr]=j;
      }
      break;
    }
  }
  if(headerIdx<0)throw new Error("Cannot find header row — expected 'SKU' in first column.");
  if(!Object.keys(monthCols).length)throw new Error("No month columns found (expected June, July, etc.).");
  const fcData={};
  for(let i=headerIdx+1;i<rows.length;i++){
    const row=rows[i];
    const sku=String(row[0]||"").trim();
    if(!sku||isNaN(+sku)||+sku===0)continue;
    fcData[sku]={};
    for(const[abbr,colIdx]of Object.entries(monthCols)){
      const v=parseFloat(row[colIdx])||0;
      if(v>0)fcData[sku][abbr]=v;
    }
  }
  const skuCount=Object.keys(fcData).length;
  if(!skuCount)throw new Error("No SKU data found. Check the file format.");
  return{fcData,months:Object.keys(monthCols),skuCount};
}

function getSales(sd,sku,yr,abbr,ch){
  if(!sd)return 0;
  return(!ch||ch==="all")?sd.totals[`${sku}|${yr}|${abbr}`]||0:
    (Array.isArray(ch)?ch:[ch]).reduce((s,c)=>s+(sd.byChannel[`${sku}|${yr}|${abbr}|${c}`]||0),0);
}

/* ══ FORECAST TABLE ══ */
function ForecastTable({nsItems,meta,edits,setEdits,itemList,ilMeta,onILLoad,onClear,editMode}){
  const [search,setSearch]=useState("");const [fBrand,setFBrand]=useState("all");const [fPLM,setFPLM]=useState("all");
  const [viewMode,setViewMode]=useState("units");
  const [showAdd,setShowAdd]=useState(false);
  const [editCell,setEditCell]=useState(null);const [editVal,setEditVal]=useState("");const cellRef=useRef(null);
  const [ilLoading,setILLoading]=useState(false);const ilRef=useRef(null);
  const [sortCol,setSortCol]=useState("description");const [sortDir,setSortDir]=useState("asc");
  const [selMonth,setSelMonth]=useState("Jul");
  const [showHidden,setShowHidden]=useState(false);
  // Hidden SKUs (removed from view but restorable)
  const [hiddenSkus,setHiddenSkus]=useState(()=>{
    try{return new Set(JSON.parse(localStorage.getItem(LS_HIDDEN)||"[]"));}catch{return new Set();}
  });

  const getE=useCallback(sku=>edits[sku]||{index:1,overrides:{}},[edits]);
  const getBP=useCallback(sku=>itemList?.[sku]?.basePrice||edits[sku]?.basePrice||0,[itemList,edits]);
  // Is this SKU a Core item? Non-core = MTO → default forecast 0
  const isCoreItem=useCallback(sku=>{
    if(!itemList)return true; // no item list loaded → assume core
    const il=itemList[sku];
    if(!il)return true;       // not in list → assume core
    return il.isCore!==false; // false = explicitly Non-Core = MTO
  },[itemList]);

  const allItems=useMemo(()=>{
    const manual=Object.entries(edits).filter(([,e])=>e.manual).map(([sku,e])=>({sku,description:e.description||sku,brand:e.brand||"",plm:e.plm||"",weightedMonthly:e.weightedMonthly||0}));
    return[...nsItems,...manual].filter(it=>!hiddenSkus.has(it.sku));
  },[nsItems,edits,hiddenSkus]);

  const setIdx=(sku,v)=>setEdits(p=>({...p,[sku]:{...(p[sku]||{index:1,overrides:{}}),index:parseFloat(v)||1}}));
  const setOv=(sku,m,v)=>setEdits(p=>{const e=p[sku]||{index:1,overrides:{}};return{...p,[sku]:{...e,overrides:{...e.overrides,[m]:Math.round(parseFloat(v))}}};});
  const clrOv=(sku,m)=>setEdits(p=>{const e=p[sku]||{index:1,overrides:{}};const o={...e.overrides};delete o[m];return{...p,[sku]:{...e,overrides:o}};});

  // Remove: manual items deleted from edits; NS items hidden (restorable)
  const removeItem=(sku,isManual)=>{
    if(!confirm("Remove this SKU from the forecast?\n\nNS items can be restored via \"Show hidden\" in the toolbar."))return;
    if(isManual){setEdits(p=>{const n={...p};delete n[sku];return n;});}
    else{setHiddenSkus(prev=>{const next=new Set(prev);next.add(sku);localStorage.setItem(LS_HIDDEN,JSON.stringify([...next]));return next;});}
  };
  const restoreItem=sku=>setHiddenSkus(prev=>{const next=new Set(prev);next.delete(sku);localStorage.setItem(LS_HIDDEN,JSON.stringify([...next]));return next;});

  const startEdit=(sku,m,cur)=>{if(!editMode)return;setEditCell({sku,m});setEditVal(String(cur));setSelMonth(m);setTimeout(()=>cellRef.current?.select(),25);};
  const commit=()=>{if(!editCell)return;const v=parseFloat(editVal);if(!isNaN(v)&&v>=0)setOv(editCell.sku,editCell.m,v);setEditCell(null);};
  const addItem=item=>setEdits(p=>({...p,[item.sku]:{index:1,overrides:{},manual:true,description:item.description,brand:item.brand,plm:item.plm,basePrice:item.basePrice,weightedMonthly:item.weightedMonthly}}));
  const handleILUpload=f=>{setILLoading(true);const r=new FileReader();r.onload=e=>{try{const il=parsePlanningList(e.target.result);const m={filename:f.name,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),count:Object.keys(il).length};localStorage.setItem(LS_IL,JSON.stringify(il));localStorage.setItem(LS_ILMETA,JSON.stringify(m));setILLoading(false);onILLoad(il,m);}catch{setILLoading(false);}};r.readAsArrayBuffer(f);};

  const handleSort=col=>{if(col===sortCol){setSortDir(d=>d==="asc"?"desc":"asc");}else{setSortCol(col);setSortDir("asc");}};
  const handleMonthHeader=m=>{handleSort(m);setSelMonth(m);};
  const SI=({col})=><span style={{marginLeft:3,fontSize:8,opacity:.5}}>{sortCol===col?(sortDir==="asc"?"▲":"▼"):"⇅"}</span>;

  const brands=useMemo(()=>[...new Set(allItems.map(i=>i.brand).filter(Boolean))].sort(),[allItems]);
  const plms=useMemo(()=>[...new Set(allItems.map(i=>i.plm).filter(Boolean))].sort(),[allItems]);
  const filtered=useMemo(()=>allItems.filter(it=>{
    if(fBrand!=="all"&&it.brand!==fBrand)return false;
    if(fPLM!=="all"&&it.plm!==fPLM)return false;
    if(search){const t=search.toLowerCase();return it.sku.includes(t)||it.description.toLowerCase().includes(t)||(it.brand||"").toLowerCase().includes(t);}
    return true;
  }),[allItems,fBrand,fPLM,search]);

  // Get units for a cell: respects MTO (non-core → 0 unless overridden by planner)
  const getUnits=useCallback((it,e,m)=>{
    const over=e.overrides[m];
    if(over!=null)return over;           // planner hard-key always applies
    if(!isCoreItem(it.sku))return 0;     // non-core/MTO: zero by default
    return fc(it.weightedMonthly,e.index,m);
  },[isCoreItem,edits]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{
    const aDrop=plmNum(a.plm)==="4",bDrop=plmNum(b.plm)==="4";
    if(aDrop!==bDrop)return aDrop?1:-1;
    const mul=sortDir==="asc"?1:-1;
    if(sortCol==="sku")return mul*((parseInt(a.sku)||0)-(parseInt(b.sku)||0));
    if(sortCol==="description")return mul*a.description.localeCompare(b.description);
    if(sortCol==="brand")return mul*(a.brand||"").localeCompare(b.brand||"");
    if(sortCol==="plm")return mul*(plmNum(a.plm)||"9").localeCompare(plmNum(b.plm)||"9");
    if(sortCol==="wtdavg")return mul*(a.weightedMonthly-b.weightedMonthly);
    if(sortCol==="index"){const ea=getE(a.sku),eb=getE(b.sku);return mul*((ea.index||1)-(eb.index||1));}
    if(MONTHS.includes(sortCol)){
      const ea=getE(a.sku),eb=getE(b.sku);
      return mul*(getUnits(a,ea,sortCol)-getUnits(b,eb,sortCol));
    }
    return 0;
  }),[filtered,sortCol,sortDir,edits,isCoreItem]);

  const totals=useMemo(()=>{const t={};MONTHS.forEach(m=>{let u=0,d=0;filtered.forEach(it=>{const e=getE(it.sku);const units=getUnits(it,e,m);u+=units;d+=Math.round(units*(getBP(it.sku)||0));});t[m]={u,d};});return t;},[filtered,edits,itemList,isCoreItem]);

  const totalUnits=MONTHS.reduce((s,m)=>s+totals[m].u,0);
  const totalDollars=MONTHS.reduce((s,m)=>s+totals[m].d,0);
  const hasPrice=!!itemList&&Object.keys(itemList).length>0;
  const modCount=Object.keys(edits).filter(sku=>{const e=edits[sku];return(!e.manual)&&(e.index!==1||Object.keys(e.overrides||{}).length>0);}).length;
  const manualCount=Object.values(edits).filter(e=>e.manual).length;
  const selUnits=totals[selMonth]?.u||0;const selDollars=totals[selMonth]?.d||0;

  const exportXL=()=>{
    const hdr=["SKU","Description","Brand","PLM","Core/MTO","Wtd Avg","Index",...MONTHS.map(m=>MFULL[m]+" Units")];

    const body=sorted.map(it=>{

    const ws=XLSX.utils.aoa_to_sheet([hdr,...body]);
    ws["!cols"]=[8,36,12,8,6,8,6,...MONTHS.map(()=>10),...(hasPrice?MONTHS.map(()=>12):[])].map(w=>({wch:w}));
    const wb2=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb2,ws,"Forecast Jul-Feb");XLSX.writeFile(wb2,"TCC_Forecast_July2026.xlsx");
  };

  const isDollar=viewMode==="$";
  const cellValue=(sku,units)=>{if(!isDollar)return units.toLocaleString();const bp=getBP(sku);if(!bp)return"—";return fmtDollar(units*bp);};

  return <div className={`page${isDollar?" dollar-mode":""}`}>
    {/* View-only banner */}
    {!editMode&&<div style={{background:"var(--navy2)",border:"1px solid var(--navy3)",borderRadius:"var(--r)",padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,fontSize:12,color:"#93B4CC"}}>
      <span style={{fontSize:16}}>🔒</span>
      <span><strong style={{color:"#fff"}}>View only</strong> — All data is visible but editing is locked. Click Unlock in the top bar to make changes.</span>
    </div>}

    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,gap:8,flexWrap:"wrap"}}>
      <div><div style={{fontSize:16,fontWeight:600}}>July 2026 forecast</div>
        <div style={{fontSize:11,color:"var(--text3)"}}>{meta.filename} · {meta.count} NS SKUs · {meta.date}</div></div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        {editMode&&<button className="btn-ghost btn-sm" onClick={onClear}>↑ Upload new NS file</button>}
        {editMode&&<button className="btn-sm btn-danger" onClick={()=>{if(confirm("Reset all edits?"))setEdits({});}}>↺ Reset edits</button>}
        <button className="btn-primary" onClick={exportXL}>⬇ Export Excel</button>
      </div>
    </div>

    <div className="stats">
      <StatCard lbl="SKUs" val={allItems.length} sub={manualCount>0?`${meta.count} NS + ${manualCount} added`:"from NS export"}/>
      <StatCard lbl="Avg monthly" val={isDollar&&hasPrice?fmtMoney(Math.round(totalDollars/8)):Math.round(totalUnits/8).toLocaleString()} sub={isDollar&&hasPrice?"est. avg revenue / month":"avg forecast units / month"}/>
      <StatCard lbl={`${MFULL[selMonth]} forecast`} val={isDollar&&hasPrice?fmtMoney(selDollars):selUnits.toLocaleString()} sub={isDollar&&hasPrice?"est. revenue · click month":"units · click month"} color={isDollar&&hasPrice?"var(--green)":undefined}/>

      <div className="seg"><button className={!isDollar?"on":""} onClick={()=>setViewMode("units")}>Units</button><button className={isDollar?"on":""} onClick={()=>setViewMode("$")}>$ Est.</button></div>

      <div style={{fontSize:12,fontWeight:600,color:"var(--amber)",marginBottom:8}}>Hidden SKUs — click Restore to add back to forecast</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {[...hiddenSkus].map(sku=>{const ns=nsItems.find(i=>i.sku===sku);return <div key={sku} style={{display:"flex",alignItems:"center",gap:6,background:"var(--white)",border:"1px solid var(--amberbd)",borderRadius:"var(--r)",padding:"4px 8px",fontSize:12}}>

          <th style={{...thSort,minWidth:88}} onClick={()=>handleSort("brand")}>Brand<SI col="brand"/></th>
          <th className="c" style={{...thSort,minWidth:60}} onClick={()=>handleSort("plm")}>PLM<SI col="plm"/></th>
          <th className="r" style={{...thSort,minWidth:68}} onClick={()=>handleSort("wtdavg")}>Wtd avg<SI col="wtdavg"/></th>
          {hasPrice&&isDollar&&<th className="r" style={{minWidth:68}}>Price</th>}
          <th className="c" style={{...thSort,minWidth:68}} onClick={()=>handleSort("index")}>Index<SI col="index"/><div style={{fontSize:9,fontWeight:400,textTransform:"none",letterSpacing:0,color:"var(--text3)",marginTop:1}}>{editMode?"editable":"locked"}</div></th>
          {MONTHS.map(m=><th key={m} className="r" style={{...thSort,minWidth:70,background:m===selMonth?"#E8F0FE":undefined,color:m===selMonth?"var(--blue)":undefined}} onClick={()=>handleMonthHeader(m)} title={`Sort by ${MFULL[m]}`}>
            {m}<SI col={m}/>
            <div style={{fontSize:9,fontWeight:700,textTransform:"none",letterSpacing:0,marginTop:1,color:m===selMonth?"var(--blue)":SEASON[m]===maxS?"#16a34a":SEASON[m]===minS?"#dc2626":"var(--text3)"}}>{(SEASON[m]*100).toFixed(1)}%</div>
          </th>)}
          <th style={{minWidth:36}}></th>
        </tr></thead>
        <tbody>{sorted.map(it=>{
          const e=getE(it.sku);const bp=getBP(it.sku);const isManual=!!e.manual;
          const core=isCoreItem(it.sku);
          return <tr key={it.sku} style={isManual?{background:"#FFFFF8"}:!core?{background:"#FAFAFA"}:undefined}>
            <td className="pin" style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)"}}>{it.sku}
              {isManual&&<span style={{marginLeft:4,fontSize:9,background:"var(--amberbg)",color:"var(--amber)",padding:"0 3px",borderRadius:2}}>new</span>}
            </td>
            <td style={{maxWidth:230,overflow:"hidden",textOverflow:"ellipsis"}} title={it.description}>
              {it.description}
              {!core&&<span style={{marginLeft:5,fontSize:9,background:"#E5E7EB",color:"#6B7280",padding:"0 4px",borderRadius:2,fontWeight:600}} title="Made to Order — forecast defaults to 0 unless planner overrides">MTO</span>}
            </td>
            <td style={{color:"var(--text3)",fontSize:11}}>{it.brand}</td>
            <td style={{textAlign:"center"}}><span className={plmCls(it.plm)}>{plmLabel(it.plm)}</span></td>
            <td style={{textAlign:"right",color:"var(--text2)"}}>{it.weightedMonthly.toLocaleString()}</td>
            {hasPrice&&isDollar&&<td style={{textAlign:"right",color:"var(--text3)",fontSize:11}}>{bp>0?"$"+bp:"—"}</td>}
            <td style={{textAlign:"center"}}>
              <input type="number" className={`idx-in${e.index!==1?" changed":""}`} value={e.index} step={.05} min={0} disabled={!editMode} onChange={ev=>setIdx(it.sku,ev.target.value)} style={!editMode?{opacity:.6,cursor:"default"}:undefined}/>
            </td>
            {MONTHS.map(m=>{
              const isEdit=editMode&&editCell?.sku===it.sku&&editCell?.m===m;
              const over=e.overrides[m];
              const units=getUnits(it,e,m); // uses MTO logic
              const disp=cellValue(it.sku,units);
              const isSel=m===selMonth;
              const isMtoZero=!core&&over==null; // MTO zero (no override)
              if(isEdit)return <td key={m} className="fc-edit"><input ref={cellRef} type="number" value={editVal} onChange={ev=>setEditVal(ev.target.value)} onBlur={commit} onKeyDown={ev=>{if(ev.key==="Enter"||ev.key==="Tab"){ev.preventDefault();commit();}if(ev.key==="Escape")setEditCell(null);}}/></td>;
              return <td key={m}
                className={over!=null?"fc-hard":"fc-auto"}
                style={{
                  cursor:editMode?"pointer":"default",
                  background:over!=null?undefined:isSel?"#F0F5FF":undefined,
                  color:isMtoZero?"#D1D5DB":over!=null?"var(--amber)":"var(--text2)",
                  fontStyle:isMtoZero?"italic":undefined,
                }}
                onClick={()=>startEdit(it.sku,m,units)}
                onContextMenu={ev=>{ev.preventDefault();if(editMode&&over!=null)clrOv(it.sku,m);}}
                title={isMtoZero?"MTO item — click to enter a specific order quantity"
                  :over!=null?`Hard-keyed: ${units.toLocaleString()} units\nRight-click to revert`
                  :`Auto: ${units.toLocaleString()} units · click to override`}>
                {disp}
              </td>;
            })}
            <td style={{textAlign:"center",padding:"2px 4px"}}>
              {editMode&&<button className="btn-sm btn-danger" style={{padding:"1px 5px",fontSize:10}} onClick={()=>removeItem(it.sku,isManual)} title="Remove from forecast">✕</button>}
            </td>
          </tr>;
        })}</tbody>
        <tfoot><tr>
          <td className="pin">Total</td>
          <td colSpan={hasPrice&&isDollar?5:4} style={{fontSize:10,color:"var(--text3)",fontWeight:400}}>{filtered.length} SKUs · July–February 2026</td>
          <td></td>
          {MONTHS.map(m=>{const{u,d}=totals[m];const isSel=m===selMonth;return <td key={m} style={{textAlign:"right",background:isSel?"#E8F0FE":undefined,color:isSel?"var(--blue)":undefined,fontWeight:isSel?700:undefined}}>{isDollar&&hasPrice?fmtDollar(d):u.toLocaleString()}</td>;})}
          <td></td>
        </tr></tfoot>
      </table>
    </div>
    <div className="hint">
      <strong>Sort</strong>: click any header (▲/▼). Drop items always last. &nbsp;
      <strong>MTO</strong>: non-core items default to 0 — click cell to enter a specific order quantity. &nbsp;
      <strong>Remove</strong>: ✕ hides from forecast; NS items can be restored via "👁 hidden" button. &nbsp;
      <strong>Selected month</strong> <span style={{background:"#E8F0FE",color:"var(--blue)",padding:"0 4px",borderRadius:2,fontSize:10}}>{selMonth}</span>: click month header or cell to update stat card.
    </div>
  </div>;
}
/* ══ ACTUAL VS FORECAST TAB ══ */
function ActualUpload({onLoad,savedMeta,hasNS}){
  const [file,setFile]=useState(null);const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const handle=f=>{setFile(f);setErr("");setLoading(true);const r=new FileReader();r.onload=e=>{try{const sd=parseSalesCSV(e.target.result);const m={filename:f.name,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),rows:sd.rowCount,pivotKeys:sd.pivotKeys};try{localStorage.setItem(LS_SALES,JSON.stringify({totals:sd.totals,byChannel:sd.byChannel,channels:sd.channels,skuMeta:sd.skuMeta}));localStorage.setItem(LS_SMETA,JSON.stringify(m));}catch(e){}setLoading(false);onLoad(sd,m);}catch(ex){setErr(ex.message);setLoading(false);}};r.readAsArrayBuffer(f);};
  return <div className="upload-wrap"><div className="upload-card">
    <h2>Actual vs Forecast — Sales history</h2>
    <p className="sub">Upload the NetSuite sales history CSV to compare actual sales against the forecast by SKU and month.</p>
    {!hasNS&&<div className="notice" style={{marginBottom:14}}>⚠ Upload NS export in the Forecast tab first for FC vs ACT comparison.</div>}
    {err&&<div className="err-box">⚠ {err}</div>}
    {savedMeta&&<div className="prev-banner"><span>Last: <strong>{savedMeta.filename}</strong> ({savedMeta.rows?.toLocaleString()} rows, {savedMeta.date})</span><button className="btn-sm" onClick={()=>{try{const d=JSON.parse(localStorage.getItem(LS_SALES)||"null");if(d)onLoad(d,savedMeta);}catch{}}}>Use this →</button></div>}
    <DropZone label="Drop sales history CSV here" hint=".csv — must have Base Item Name, YEAR, MONTH, Invoiced Qty" accept=".csv,.xlsx,.xls" loaded={!!file&&!loading} fileName={loading?"Parsing…":file?.name} loading={loading} onFile={handle}/>
    <div className="info-grid">
      <div className="info-cell"><div className="lbl">CY actuals</div><div className="val">2026 data</div></div>
      <div className="info-cell"><div className="lbl">Prior year</div><div className="val">2025 same months</div></div>
      <div className="info-cell"><div className="lbl">Channel filter</div><div className="val">Built-in</div></div>
      <div className="info-cell"><div className="lbl">FC source</div><div className="val">Forecast tab</div></div>
    </div>
  </div></div>;
}

function ActualTable({nsItems,edits,itemList,salesData,meta,historicalFC,histFCMeta,onHistLoad,onClear}){
  const [search,setSearch]=useState("");const [fBrand,setFBrand]=useState("all");const [fPLM,setFPLM]=useState("all");
  const [selCh,setSelCh]=useState("all");const [showPY,setShowPY]=useState(true);
  const [histLoading,setHistLoading]=useState(false);const histRef=useRef(null);

  const getE=useCallback(sku=>edits[sku]||{index:1,overrides:{}},[edits]);

  // Get FC for a given month:
  //   June (past)  → use historicalFC from uploaded Excel file
  //   Jul–Feb (current/future) → use modeled forecast (NS weighted avg × index × seasonality)
  const getFCVal=useCallback((sku,m)=>{
    const cal=ACT_FC_CAL[m];
    if(cal.tag==="past"&&historicalFC){
      const v=historicalFC[sku]?.[m];
      if(v!=null&&v>0)return v;
      return 0; // SKU not in historical file = 0 forecast for that past month
    }
    // Modeled forecast
    const ns=nsItems.find(i=>i.sku===sku);
    const e=getE(sku);
    const wm=ns?ns.weightedMonthly:(e.manual?e.weightedMonthly||0:0);
    const over=e.overrides[m];
    return over!=null?over:fc(wm,e.index,m);
  },[historicalFC,nsItems,edits]);

  const handleHistUpload=f=>{
    setHistLoading(true);
    const r=new FileReader();
    r.onload=e=>{
      try{
        const result=parseHistoricalForecast(e.target.result);
        const m={filename:f.name,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),skuCount:result.skuCount,months:result.months};
        try{localStorage.setItem(LS_HIST,JSON.stringify(result.fcData));localStorage.setItem(LS_HMETA,JSON.stringify(m));}catch{}
        setHistLoading(false);onHistLoad(result.fcData,m);
      }catch(ex){alert("Could not parse forecast file: "+ex.message);setHistLoading(false);}
    };
    r.readAsArrayBuffer(f);
  };

  // Build SKU list: NS items + manual + any SKU that has actuals in current year
  const allSkus=useMemo(()=>{
    const set=new Set(nsItems.map(i=>i.sku));
    Object.entries(edits).filter(([,e])=>e.manual).forEach(([s])=>set.add(s));
    if(salesData){
      ACT_MONTHS.forEach(m=>{
        const[cy]=ACT_FC_CAL[m].cy;
        Object.keys(salesData.totals).forEach(k=>{
          const[s,y]=k.split("|");
          if(+y===cy&&!set.has(s)&&salesData.totals[k]>0)set.add(s);
        });
      });
    }
    return[...set];
  },[nsItems,edits,salesData]);

  const rows=useMemo(()=>allSkus.map(sku=>{
    const ns=nsItems.find(i=>i.sku===sku);const e=getE(sku);
    const sm=salesData?.skuMeta?.[sku];const il=itemList?.[sku];
    const description=ns?.description||e.description||il?.displayName||sm?.description||sku;
    const brand=ns?.brand||e.brand||il?.brand||sm?.brand||"";
    const plm=ns?.plm||e.plm||il?.plm||sm?.plm||"";
    const months={};
    ACT_MONTHS.forEach(m=>{
      const f=getFCVal(sku,m);
      const[cy,ca]=ACT_FC_CAL[m].cy;const[py,pa]=ACT_FC_CAL[m].py;
      const act=salesData?getSales(salesData,sku,cy,ca,selCh):0;
      const prev=salesData?getSales(salesData,sku,py,pa,selCh):0;
      months[m]={fc:f,act,py:prev};
    });
    return{sku,description,brand,plm,months};
  }),[allSkus,nsItems,edits,itemList,salesData,selCh,historicalFC]);

  const brands=useMemo(()=>[...new Set(rows.map(r=>r.brand).filter(Boolean))].sort(),[rows]);
  const plms=useMemo(()=>[...new Set(rows.map(r=>r.plm).filter(Boolean))].sort(),[rows]);
  const filtered=useMemo(()=>rows.filter(r=>{
    if(fBrand!=="all"&&r.brand!==fBrand)return false;
    if(fPLM!=="all"&&r.plm!==fPLM)return false;
    if(search){const t=search.toLowerCase();return r.sku.includes(t)||r.description.toLowerCase().includes(t)||(r.brand||"").toLowerCase().includes(t);}
    return true;
  }),[rows,fBrand,fPLM,search]);

  const colTotals=useMemo(()=>{const t={};ACT_MONTHS.forEach(m=>{t[m]={fc:filtered.reduce((s,r)=>s+r.months[m].fc,0),act:filtered.reduce((s,r)=>s+r.months[m].act,0),py:filtered.reduce((s,r)=>s+r.months[m].py,0)};});return t;},[filtered]);
  const juneFC=colTotals["Jun"]?.fc||0;const juneACT=colTotals["Jun"]?.act||0;
  const totalFC=ACT_MONTHS.filter(m=>m!=="Jun").reduce((s,m)=>s+colTotals[m].fc,0);
  const totalACT=ACT_MONTHS.reduce((s,m)=>s+colTotals[m].act,0);

  const exportXL=()=>{
    const hdr=["SKU","Description","Brand","PLM",...ACT_MONTHS.flatMap(m=>[`${m} FC`,`${m} ACT`,`${m} PY`,`${m} Var%`])];
    const body=filtered.map(r=>[r.sku,r.description,r.brand,plmLabel(r.plm),...ACT_MONTHS.flatMap(m=>{const{fc:f,act:a,py:p}=r.months[m];return[f||"",a||"",p||"",f>0&&a>0?((a-f)/f*100).toFixed(1)+"%":""];})]);
    const ws2=XLSX.utils.aoa_to_sheet([hdr,...body]);ws2["!cols"]=[8,34,12,8,...ACT_MONTHS.flatMap(()=>[9,9,9,8])].map(w=>({wch:w}));
    const wb2=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb2,ws2,"Actual vs Forecast");XLSX.writeFile(wb2,"TCC_Actual_vs_Forecast.xlsx");
  };

  // Cell renderer — handles past/current/future month display
  const Cell=({fc:f,act:a,py:p,tag})=>{
    const has=a>0,hasFc=f>0,hasPY=p>0;
    const ratio=hasFc&&has?a/f:null;
    const isCurrent=tag==="current";
    let cls="mc future",ac="var(--text3)";
    if(has&&hasFc){if(ratio>=1){cls="mc on-track";ac="var(--green)";}else if(ratio>=.8){cls="mc behind";ac="var(--amber)";}else{cls="mc miss";ac="var(--red)";}}
    else if(has){cls="mc";ac="var(--text2)";}
    return <td className={cls}>
      {hasFc&&<div className="fc-row">FC {f.toLocaleString()}</div>}
      <div className="act-row" style={{color:ac}}>
        {has?a.toLocaleString():hasFc?"—":"–"}
        {isCurrent&&has&&<span style={{fontSize:9,color:"var(--text3)",marginLeft:3}}>●</span>}
      </div>
      {ratio!==null&&<div className="var-row" style={{color:ratio>=1?"var(--green)":ratio>=.8?"var(--amber)":"var(--red)"}}>{ratio>=1?"↑":"↓"}{Math.abs((ratio-1)*100).toFixed(1)}%</div>}
      {showPY&&hasPY&&<div className="py-row">PY {p.toLocaleString()}</div>}
    </td>;
  };

  const hasNS=nsItems&&nsItems.length>0;

  // Column header based on month tag
  const MonthHeader=({m})=>{
    const cal=ACT_FC_CAL[m];const[cy]=cal.cy;
    const yr=m==="Jan"||m==="Feb"?cy:2026;
    if(cal.tag==="past")return <th className="mh" style={{background:"var(--bluebg)",borderBottom:"2px solid var(--bluebd)"}}>
      {m}<div className="yr" style={{color:"var(--blue)"}}>{yr} hist</div>
    </th>;
    if(cal.tag==="current")return <th className="mh" style={{background:"var(--amberbg)",borderBottom:"2px solid var(--amberbd)"}}>
      {m}<div className="yr" style={{color:"var(--amber)"}}>{yr} now</div>
    </th>;
    return <th className="mh">{m}<div className="yr">{yr}</div></th>;
  };

  return <div className="page">
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,gap:8,flexWrap:"wrap"}}>
      <div>
        <div style={{fontSize:16,fontWeight:600}}>Actual vs forecast</div>
        <div style={{fontSize:11,color:"var(--text3)"}}>{meta.filename} · {meta.rows?.toLocaleString()} rows · all customers combined · {meta.date}</div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><button className="btn-ghost btn-sm" onClick={onClear}>↑ Upload new sales file</button><button className="btn-primary" onClick={exportXL}>⬇ Export Excel</button></div>
    </div>

    <div className="stats">
      {juneFC>0&&<StatCard lbl="June FC" val={juneFC.toLocaleString()} sub="from uploaded forecast" color="var(--blue)"/>}
      {juneACT>0&&<StatCard lbl="June actual" val={juneACT.toLocaleString()} sub={juneFC>0?`${Math.round(juneACT/juneFC*100)}% of forecast`:"final sales"} color={juneACT>=juneFC?"var(--green)":juneACT>=juneFC*.8?"var(--amber)":"var(--red)"}/>}
      <StatCard lbl="Jul–Feb FC" val={hasNS?totalFC.toLocaleString():"—"} sub="modeled forecast"/>
      <StatCard lbl="Total actual (all)" val={totalACT>0?totalACT.toLocaleString():"—"} sub="incl. July in progress"/>
      <StatCard lbl="SKUs" val={filtered.length} sub={`of ${rows.length}`}/>
    </div>

    <div className="toolbar">
      <input type="search" placeholder="Search SKU or name…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:190}}/>
      <select value={fBrand} onChange={e=>setFBrand(e.target.value)}><option value="all">All brands</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select>
      <select value={fPLM} onChange={e=>setFPLM(e.target.value)}><option value="all">All PLM</option>{plms.map(p=><option key={p} value={p}>{plmLabel(p)}</option>)}</select>
      {salesData?.channels&&<select value={selCh} onChange={e=>setSelCh(e.target.value)}><option value="all">All channels</option>{salesData.channels.map(c=><option key={c} value={c}>{c}</option>)}</select>}
      <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={showPY} onChange={e=>setShowPY(e.target.checked)} style={{width:"auto",padding:0}}/> Show PY</label>
      <div className="toolbar-r">
        {/* Historical forecast upload (June Excel) */}
        <input type="file" ref={histRef} accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleHistUpload(e.target.files[0]);}}/>
        {histFCMeta
          ?<span className="il-badge" style={{cursor:"pointer"}} onClick={()=>histRef.current?.click()} title="Click to replace historical forecast file">
              <i className="ti ti-circle-check" aria-hidden/> June FC: {histFCMeta.skuCount} SKUs
            </span>
          :<button className="btn-sm btn-primary" onClick={()=>histRef.current?.click()} title="Upload June forecast Excel to show June FC column">
              {histLoading?"Parsing…":"⬆ Upload June forecast"}
            </button>}
        <div className="legend">
          <span className="ld" style={{background:"var(--greenbg)",border:"1px solid var(--greenbd)"}}/>≥100%
          <span className="ld" style={{background:"var(--amberbg)",border:"1px solid var(--amberbd)"}}/>80–99%
          <span className="ld" style={{background:"var(--redbg)",border:"1px solid var(--redbd)"}}/>&lt;80%
        </div>
      </div>
    </div>

    <div className="notice" style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
      <span><span style={{background:"var(--bluebg)",color:"var(--blue)",padding:"1px 6px",borderRadius:3,fontSize:10,fontWeight:600}}>hist</span> June: uploaded forecast vs final actual sales</span>
      <span><span style={{background:"var(--amberbg)",color:"var(--amber)",padding:"1px 6px",borderRadius:3,fontSize:10,fontWeight:600}}>now</span> July: modeled forecast vs sales in progress (●)</span>
      <span>Aug–Feb: modeled forecast only (no actuals yet)</span>
      {selCh!=="all"&&<span>⚠ Channel filter active: <strong>{selCh}</strong></span>}
    </div>

    <div className="twrap">
      <table>
        <thead><tr>
          <th className="pin" style={{minWidth:56}}>SKU</th>
          <th style={{minWidth:200}}>Description</th>
          <th style={{minWidth:80}}>Brand</th>
          <th className="c" style={{minWidth:55}}>PLM</th>
          {ACT_MONTHS.map(m=><MonthHeader key={m} m={m}/>)}
        </tr></thead>
        <tbody>{filtered.map(r=><tr key={r.sku}>
          <td className="pin" style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)"}}>{r.sku}</td>
          <td style={{maxWidth:210,overflow:"hidden",textOverflow:"ellipsis"}} title={r.description}>{r.description}</td>
          <td style={{color:"var(--text3)",fontSize:11}}>{r.brand}</td>
          <td style={{textAlign:"center"}}><span className={plmCls(r.plm)}>{plmLabel(r.plm)}</span></td>
          {ACT_MONTHS.map(m=>{const{fc:f,act:a,py:p}=r.months[m];return <Cell key={m} fc={f} act={a} py={p} tag={ACT_FC_CAL[m].tag}/>;})}</tr>
        )}</tbody>
        <tfoot><tr>
          <td className="pin">Total</td>
          <td colSpan={3} style={{fontSize:10,color:"var(--text3)",fontWeight:400}}>{filtered.length} SKUs · {selCh==="all"?"All channels":selCh}</td>
          {ACT_MONTHS.map(m=>{const{fc:f,act:a,py:p}=colTotals[m];const ratio=f>0&&a>0?a/f:null;const cal=ACT_FC_CAL[m];
            return <td key={m} style={{textAlign:"right",padding:"6px 8px",verticalAlign:"top",background:cal.tag==="past"?"var(--bluebg)":cal.tag==="current"?"var(--amberbg)":undefined}}>
              {f>0&&<div style={{fontSize:10,color:"var(--text3)"}}>FC {f.toLocaleString()}</div>}
              <div style={{fontSize:11,fontWeight:700,color:ratio===null?"var(--text3)":ratio>=1?"var(--green)":ratio>=.8?"var(--amber)":"var(--red)"}}>{a>0?a.toLocaleString():"—"}</div>
              {showPY&&p>0&&<div style={{fontSize:10,color:"#2563EB"}}>PY {p.toLocaleString()}</div>}
            </td>;
          })}
        </tr></tfoot>
      </table>
    </div>
    <div className="hint">
      <strong>June (blue)</strong>: FC from uploaded forecast file · <strong>July (amber)</strong>: FC from modeling, ● = actuals still coming in · <strong>Aug–Feb</strong>: modeling only. Export includes all months and metrics.
    </div>
  </div>;
}
  const [search,setSearch]=useState("");const [fBrand,setFBrand]=useState("all");const [fPLM,setFPLM]=useState("all");
  const [selCh,setSelCh]=useState("all");const [showPY,setShowPY]=useState(true);

  const getE=useCallback(sku=>edits[sku]||{index:1,overrides:{}},[edits]);
  const getFCVal=useCallback((sku,m)=>{
    const it=nsItems.find(i=>i.sku===sku);
    const e=getE(sku);const man=e.manual;
    const wm=it?it.weightedMonthly:man?e.weightedMonthly||0:0;
    const over=e.overrides[m];
    return over!=null?over:fc(wm,e.index,m);
  },[nsItems,edits]);

  const allSkus=useMemo(()=>{
    const set=new Set(nsItems.map(i=>i.sku));
    Object.entries(edits).filter(([,e])=>e.manual).forEach(([s])=>set.add(s));
    if(salesData){MONTHS.forEach(m=>{const[cy]=FC_CAL[m].cy;Object.keys(salesData.totals).forEach(k=>{const[s,y]=k.split("|");if(+y===cy&&!set.has(s)&&salesData.totals[k]>0)set.add(s);});});}
    return[...set];
  },[nsItems,edits,salesData]);

  const rows=useMemo(()=>allSkus.map(sku=>{
    const ns=nsItems.find(i=>i.sku===sku);const e=getE(sku);const sm=salesData?.skuMeta?.[sku];const il=itemList?.[sku];
    const description=ns?.description||e.description||il?.displayName||sm?.description||sku;
    const brand=ns?.brand||e.brand||il?.brand||sm?.brand||"";
    const plm=ns?.plm||e.plm||il?.plm||sm?.plm||"";
    const months={};
    MONTHS.forEach(m=>{const f=getFCVal(sku,m);const[cy,ca]=FC_CAL[m].cy;const[py,pa]=FC_CAL[m].py;const act=salesData?getSales(salesData,sku,cy,ca,selCh):0;const prev=salesData?getSales(salesData,sku,py,pa,selCh):0;months[m]={fc:f,act,py:prev};});
    return{sku,description,brand,plm,months};
  }),[allSkus,nsItems,edits,itemList,salesData,selCh]);

  const brands=useMemo(()=>[...new Set(rows.map(r=>r.brand).filter(Boolean))].sort(),[rows]);
  const plms=useMemo(()=>[...new Set(rows.map(r=>r.plm).filter(Boolean))].sort(),[rows]);
  const filtered=useMemo(()=>rows.filter(r=>{
    if(fBrand!=="all"&&r.brand!==fBrand)return false;
    if(fPLM!=="all"&&r.plm!==fPLM)return false;
    if(search){const t=search.toLowerCase();return r.sku.includes(t)||r.description.toLowerCase().includes(t)||(r.brand||"").toLowerCase().includes(t);}
    return true;
  }),[rows,fBrand,fPLM,search]);

  const colTotals=useMemo(()=>{const t={};MONTHS.forEach(m=>{t[m]={fc:filtered.reduce((s,r)=>s+r.months[m].fc,0),act:filtered.reduce((s,r)=>s+r.months[m].act,0),py:filtered.reduce((s,r)=>s+r.months[m].py,0)};});return t;},[filtered]);
  const totalFC=MONTHS.reduce((s,m)=>s+colTotals[m].fc,0);
  const totalACT=MONTHS.reduce((s,m)=>s+colTotals[m].act,0);
  const totalPY=MONTHS.reduce((s,m)=>s+colTotals[m].py,0);

  const exportXL=()=>{
    const hdr=["SKU","Description","Brand","PLM",...MONTHS.flatMap(m=>[`${m} FC`,`${m} ACT`,`${m} PY`,`${m} Var%`])];
    const body=filtered.map(r=>[r.sku,r.description,r.brand,plmLabel(r.plm),...MONTHS.flatMap(m=>{const{fc:f,act:a,py:p}=r.months[m];return[f||"",a||"",p||"",f>0&&a>0?((a-f)/f*100).toFixed(1)+"%":""];})]);
    const ws=XLSX.utils.aoa_to_sheet([hdr,...body]);ws["!cols"]=[8,34,12,8,...MONTHS.flatMap(()=>[9,9,9,8])].map(w=>({wch:w}));
    const wb2=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb2,ws,"Actual vs Forecast");XLSX.writeFile(wb2,"TCC_Actual_vs_Forecast.xlsx");
  };

  const Cell=({fc:f,act:a,py:p})=>{
    const has=a>0,hasFc=f>0,hasPY=p>0;
    const ratio=hasFc&&has?a/f:null;
    let cls="mc future",ac="var(--text3)";
    if(has&&hasFc){if(ratio>=1){cls="mc on-track";ac="var(--green)";}else if(ratio>=.8){cls="mc behind";ac="var(--amber)";}else{cls="mc miss";ac="var(--red)";}}
    else if(has){cls="mc";ac="var(--text2)";}
    return <td className={cls}>
      {hasFc&&<div className="fc-row">FC {f.toLocaleString()}</div>}
      <div className="act-row" style={{color:ac}}>{has?a.toLocaleString():hasFc?"—":"–"}</div>
      {ratio!==null&&<div className="var-row" style={{color:ratio>=1?"var(--green)":ratio>=.8?"var(--amber)":"var(--red)"}}>{ratio>=1?"↑":"↓"}{Math.abs((ratio-1)*100).toFixed(1)}%</div>}
      {showPY&&hasPY&&<div className="py-row">PY {p.toLocaleString()}</div>}
    </td>;
  };

  const hasNS=nsItems&&nsItems.length>0;
  return <div className="page">
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,gap:8,flexWrap:"wrap"}}>
      <div><div style={{fontSize:16,fontWeight:600}}>Actual vs forecast</div><div style={{fontSize:11,color:"var(--text3)"}}>{meta.filename} · {meta.rows?.toLocaleString()} rows → {meta.pivotKeys?.toLocaleString()||"—"} SKU×Month totals (all customers combined) · {meta.date}{!hasNS&&" · ⚠ No forecast data"}</div></div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><button className="btn-ghost btn-sm" onClick={onClear}>↑ Upload new file</button><button className="btn-primary" onClick={exportXL}>⬇ Export Excel</button></div>
    </div>
    <div className="stats">
      <StatCard lbl="Total forecast" val={hasNS?totalFC.toLocaleString():"—"} sub="Jul–Feb all SKUs"/>
      <StatCard lbl="Total actual" val={totalACT>0?totalACT.toLocaleString():"—"} sub="Available months"/>
      <StatCard lbl="Overall %" val={hasNS&&totalFC>0&&totalACT>0?Math.round(totalACT/totalFC*100)+"%":"—"} sub="ACT vs FC" color={totalACT>=totalFC?"var(--green)":totalACT>=totalFC*.8?"var(--amber)":"var(--red)"}/>
      <StatCard lbl="Prior year" val={totalPY>0?totalPY.toLocaleString():"—"} sub="Same period 2025"/>
      <StatCard lbl="SKUs showing" val={filtered.length} sub={`of ${rows.length}`}/>
    </div>
    <div className="toolbar">
      <input type="search" placeholder="Search SKU or name…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:190}}/>
      <select value={fBrand} onChange={e=>setFBrand(e.target.value)}><option value="all">All brands</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select>
      <select value={fPLM} onChange={e=>setFPLM(e.target.value)}><option value="all">All PLM</option>{plms.map(p=><option key={p} value={p}>{plmLabel(p)}</option>)}</select>
      {salesData?.channels&&<select value={selCh} onChange={e=>setSelCh(e.target.value)}><option value="all">All channels</option>{salesData.channels.map(c=><option key={c} value={c}>{c}</option>)}</select>}
      <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={showPY} onChange={e=>setShowPY(e.target.checked)} style={{width:"auto",padding:0}}/> Show prior year</label>
      <div className="toolbar-r"><div className="legend"><span className="ld" style={{background:"var(--greenbg)",border:"1px solid var(--greenbd)"}}/>≥100% <span className="ld" style={{background:"var(--amberbg)",border:"1px solid var(--amberbd)"}}/>80–99% <span className="ld" style={{background:"var(--redbg)",border:"1px solid var(--redbd)"}}/>&lt;80% <span className="ld" style={{background:"#F8FAFB",border:"1px solid var(--border)"}}/>No data</div></div>
    </div>
    <div className="notice">Jul 2026 actuals available (may be partial). Aug–Feb: future, ACT = —. Prior year = same months 2025.{selCh!=="all"&&<span> Channel filter active: <strong>{selCh}</strong> (FC = all channels, so variance is expected).</span>}</div>
    <div className="twrap">
      <table>
        <thead><tr>
          <th className="pin" style={{minWidth:56}}>SKU</th>
          <th style={{minWidth:200}}>Description</th>
          <th style={{minWidth:80}}>Brand</th>
          <th className="c" style={{minWidth:60}}>PLM</th>
          {MONTHS.map(m=>{const[cy]=FC_CAL[m].cy;return <th key={m} className="mh">{m}<div className="yr">{m==="Jan"||m==="Feb"?cy:2026}</div></th>;})}
        </tr></thead>
        <tbody>{filtered.map(r=><tr key={r.sku}>
          <td className="pin" style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)"}}>{r.sku}</td>
          <td style={{maxWidth:210,overflow:"hidden",textOverflow:"ellipsis"}} title={r.description}>{r.description}</td>
          <td style={{color:"var(--text3)",fontSize:11}}>{r.brand}</td>
          <td style={{textAlign:"center"}}><span className={plmCls(r.plm)}>{plmLabel(r.plm)}</span></td>
          {MONTHS.map(m=>{const{fc:f,act:a,py:p}=r.months[m];return <Cell key={m} fc={f} act={a} py={p}/>;})}</tr>
        )}</tbody>
        <tfoot><tr>
          <td className="pin">Total</td>
          <td colSpan={3} style={{fontSize:10,color:"var(--text3)",fontWeight:400}}>{filtered.length} SKUs · {selCh==="all"?"All channels":selCh}</td>
          {MONTHS.map(m=>{const{fc:f,act:a,py:p}=colTotals[m];const r=f>0&&a>0?a/f:null;return <td key={m} style={{textAlign:"right",padding:"6px 8px",verticalAlign:"top"}}>
            {hasNS&&f>0&&<div style={{fontSize:10,color:"var(--text3)"}}>FC {f.toLocaleString()}</div>}
            <div style={{fontSize:13,fontWeight:700,color:r===null?"var(--text3)":r>=1?"var(--green)":r>=.8?"var(--amber)":"var(--red)"}}>{a>0?a.toLocaleString():"—"}</div>
            {showPY&&p>0&&<div style={{fontSize:10,color:"#2563EB"}}>PY {p.toLocaleString()}</div>}
          </td>;})}
        </tr></tfoot>
      </table>
    </div>
    <div className="hint">Each cell: <strong>FC</strong> (forecast), <strong>ACT</strong> (actual this year), optional <strong>PY</strong> (prior year). Color = ACT vs FC performance. Export includes all metrics.</div>
  </div>;
}

/* ══ ROOT ══ */
function App(){
  const [tab,setTab]=useState("forecast");
  const [nsItems,setNsItems]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_NS)||"[]");}catch{return[];}});
  const [edits,setEdits]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_EDITS)||"{}");}catch{return{};}});
  const [fcMeta,setFcMeta]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_NMETA)||"null");}catch{return null;}});
  const [itemList,setItemList]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_IL)||"null");}catch{return null;}});
  const [ilMeta,setILMeta]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_ILMETA)||"null");}catch{return null;}});
  const [fcScreen,setFcScreen]=useState(nsItems.length>0?"table":"upload");
  const [salesData,setSalesData]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_SALES)||"null");}catch{return null;}});
  const [salesMeta,setSalesMeta]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_SMETA)||"null");}catch{return null;}});
  const [salesScreen,setSalesScreen]=useState(salesData?"table":"upload");
  // Historical forecast (e.g. June forecast Excel file)
  const [historicalFC,setHistoricalFC]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_HIST)||"null");}catch{return null;}});
  const [histFCMeta,setHistFCMeta]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_HMETA)||"null");}catch{return null;}});
  // Security: edit mode (unlocked per browser session)
  const [editMode,setEditMode]=useState(()=>sessionStorage.getItem("tcc_edit_session")==="1");
  const [showUnlock,setShowUnlock]=useState(false);

  useEffect(()=>{localStorage.setItem(LS_EDITS,JSON.stringify(edits));},[edits]);

  const handleNSLoad=(its,m)=>{setNsItems(its);setFcMeta(m);setFcScreen("table");};
  const handleILLoad=(il,m)=>{setItemList(il);setILMeta(m);};
  const handleSalesLoad=(sd,m)=>{setSalesData(sd);setSalesMeta(m);setSalesScreen("table");};
  const handleHistLoad=(fc,m)=>{setHistoricalFC(fc);setHistFCMeta(m);};
  const handleUnlock=()=>{setEditMode(true);setShowUnlock(false);};
  const handleLock=()=>{sessionStorage.removeItem("tcc_edit_session");setEditMode(false);};

  return <>
    {showUnlock&&<UnlockModal onUnlock={handleUnlock} onCancel={()=>setShowUnlock(false)}/>}
    <nav className="bar">
      <div className="bar-logo">TCC <span>Demand</span></div>
      <div className="tabs">
        <button className={`tab-btn${tab==="forecast"?" active":""}`} onClick={()=>setTab("forecast")}><i className="ti ti-chart-line" aria-hidden/> Forecast</button>
        <button className={`tab-btn${tab==="actual"?" active":""}`} onClick={()=>setTab("actual")}><i className="ti ti-chart-bar" aria-hidden/> Actual vs Forecast</button>
      </div>
      <div className="bar-right">
        <span style={{fontSize:11,color:"#93B4CC"}}>{tab==="forecast"&&fcMeta?fcMeta.date:tab==="actual"&&salesMeta?salesMeta.date:""}</span>
        {editMode
          ?<button className="btn-ghost btn-sm" onClick={handleLock} title="Lock editing for this session">🔓 Lock</button>
          :<button className="btn-ghost btn-sm" onClick={()=>setShowUnlock(true)} title="Unlock to edit forecast">🔒 Unlock</button>
        }
      </div>
    </nav>
    {tab==="forecast"&&(fcScreen==="upload"
      ?<ForecastUpload onNSLoad={handleNSLoad} onILLoad={handleILLoad} savedNSMeta={fcMeta} savedILMeta={ilMeta}/>
      :<ForecastTable nsItems={nsItems} meta={fcMeta} edits={edits} setEdits={setEdits} itemList={itemList} ilMeta={ilMeta} onILLoad={handleILLoad} onClear={()=>setFcScreen("upload")} editMode={editMode}/>
    )}
    {tab==="actual"&&(salesScreen==="upload"
      ?<ActualUpload onLoad={handleSalesLoad} savedMeta={salesMeta} hasNS={nsItems.length>0}/>
      :<ActualTable nsItems={nsItems} edits={edits} itemList={itemList} salesData={salesData} meta={salesMeta} historicalFC={historicalFC} histFCMeta={histFCMeta} onHistLoad={handleHistLoad} onClear={()=>setSalesScreen("upload")}/>
    )}
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
